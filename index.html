<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="any" />
    <title>아이샵케어 CX팀 온보딩 퀴즈</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }
      body {
        min-height: 100%;
      }
      #root {
        min-height: 100%;
      }
      /**
       * 모바일 메인 컬럼: iOS 크롬에서 100dvh/100vh가 ‘보이는 영역’보다 커져
       * 세로 center 정렬 시 아래에 큰 빈 여백이 생기는 경우가 있음 → svh 우선.
       */
      .quiz-app-mobile-main {
        box-sizing: border-box;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        height: 100vh;
        max-height: 100vh;
        height: 100svh;
        max-height: 100svh;
      }
      @keyframes quiz-app-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .quiz-app-spinner {
        animation: quiz-app-spin 0.65s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
