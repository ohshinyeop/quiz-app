<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="any" />
    <title>아이샵케어 CX팀 온보딩 퀴즈</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        height: 100%;
      }
      /* 모바일 본문 스크롤 루트 — 패딩은 여기만 (상단바 fixed 보정 72px) */
      .quiz-app-mobile-main {
        box-sizing: border-box;
        height: 100%;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        padding: 72px 20px max(28px, env(safe-area-inset-bottom, 0px));
      }
      @keyframes quiz-app-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .quiz-app-spinner {
        animation: quiz-app-spin 0.65s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
